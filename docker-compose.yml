version: '3.8'

services:
  api:
    build: ./backend
    container_name: sentiment-api
    ports:
      - "8000:8000"
    environment:
      - USE_HF_API=false
      # Update this to your Vercel domain after deployment
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,https://your-vercel-domain.vercel.app
    volumes:
      - ./backend/sentiment-model:/app/sentiment-model:ro
    restart: unless-stopped
